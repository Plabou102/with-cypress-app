name: CI/CD

on:
  push:
    branches:
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node and restore npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

  lint:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node and restore npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node and restore npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Audit dependencies
        run: npm audit --audit-level=high

  secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

  e2e:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node and restore npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Intall dependencies
        run: npm install

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        env:
          TS_NODE_PROJECT: tsconfig.cypress.json
        with:
          start: npm run dev
          wait-on: 'http://localhost:3000'

  deploy_recette:
    runs-on: ubuntu-latest
    needs: e2e
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSHKEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSHHOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh "${{ secrets.SSHUSER }}@${{ secrets.SSHHOST }}" "ls -la /home/${{ secrets.SSHUSER }}/with-cypress-app-recette"

      - name: Deploy recette on server (Docker)
        run: |
          ssh "${{ secrets.SSHUSER }}@${{ secrets.SSHHOST }}" "
            cd /home/${{ secrets.SSHUSER }}/with-cypress-app-recette &&
            git fetch origin &&
            git checkout develop &&
            git pull origin develop &&
            docker compose -f compose.prod.yml down &&
            docker compose -f compose.prod.yml up --build -d
          "

  deploy_production:
    runs-on: ubuntu-latest
    needs: e2e
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSHKEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SSHHOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connexion
        run: |
          ssh "${{ secrets.SSHUSER }}@${{ secrets.SSHHOST }}" "ls -la /home/${{ secrets.SSHUSER }}/with-cypress-app-production"

      - name: Deploy production on server (Docker)
        run: |
          ssh "${{ secrets.SSHUSER }}@${{ secrets.SSHHOST }}" "
            cd /home/${{ secrets.SSHUSER }}/with-cypress-app-production &&
            git fetch origin --tags &&
            git checkout main &&
            git pull origin main &&
            docker compose -f compose.prod.yml down &&
            docker compose -f compose.prod.yml up --build -d
          "